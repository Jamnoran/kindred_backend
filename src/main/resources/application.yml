spring:
  application:
    name: kindred-api
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kindred}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:kindred}
    password: ${DB_PASSWORD:kindred}
  jpa:
    hibernate:
      ddl-auto: validate # schema is owned by Flyway, never by Hibernate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    redis:
      namespace: kindred:session
    timeout: ${SESSION_TIMEOUT:7d}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        # set true behind HTTPS (any real deployment)
        secure: ${SESSION_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# JobRunr worker runs inside the API process for now (ARCHITECTURE.md §2);
# jobs are stored in MySQL via the main DataSource (jobrunr_* tables, self-managed)
org:
  jobrunr:
    background-job-server:
      enabled: ${JOBRUNR_WORKER_ENABLED:true}
    dashboard:
      enabled: ${JOBRUNR_DASHBOARD_ENABLED:false}

kindred:
  version: ${KINDRED_VERSION:dev}
  # where verification-email links point (the web app routes them back to the API)
  web-base-url: ${WEB_BASE_URL:http://localhost:3000}
  # object storage (R2 in prod, MinIO in dev/self-host — ARCHITECTURE.md §6)
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:auto}
    access-key: ${S3_ACCESS_KEY:kindred}
    secret-key: ${S3_SECRET_KEY:kindred-secret}
    bucket: ${S3_BUCKET:kindred-media}
  media:
    # CDN (or MinIO in dev) base URL that approved profile photos are served from
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:9000/kindred-media}
