spring:
  application:
    name: kindred-api
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kindred}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:kindred}
    password: ${DB_PASSWORD:kindred}
  jpa:
    hibernate:
      ddl-auto: validate # schema is owned by Flyway, never by Hibernate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    redis:
      namespace: kindred:session

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

kindred:
  version: ${KINDRED_VERSION:dev}
