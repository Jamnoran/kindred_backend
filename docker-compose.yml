# One-command self-host is a feature (ARCHITECTURE.md §1): `docker compose up`
# brings up MySQL 8, Redis, MinIO, and the API.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-kindred}
      MYSQL_USER: ${DB_USER:-kindred}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kindred}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kindred}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kindred-secret}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-kindred}
      DB_USER: ${DB_USER:-kindred}
      DB_PASSWORD: ${DB_PASSWORD:-kindred}
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kindred}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-kindred-secret}
      # Stripe (premium one-time purchase) — docs/STRIPE_SETUP.md; empty = checkout disabled
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  minio-data:
