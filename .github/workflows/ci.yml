name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Export OpenAPI spec
        run: ./gradlew generateOpenApiDocs

      - name: Verify committed OpenAPI spec is up to date
        run: |
          git diff --exit-code openapi/ || {
            echo "::error::openapi/kindred-api.json is stale — run ./gradlew generateOpenApiDocs and commit the result"
            exit 1
          }
